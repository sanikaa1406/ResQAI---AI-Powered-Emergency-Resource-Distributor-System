<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartAid Admin Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body { font-family: Arial, sans-serif; margin: 20px; }
h2 { text-align: center; color: red; margin-bottom: 20px; }

.stats-cards { display: flex; justify-content: space-around; margin-bottom: 20px; }
.card { padding: 15px 20px; background-color: #f2f2f2; border-radius: 8px; text-align: center; width: 20%; }
.card h3 { margin: 5px 0; }
.card p { font-size: 1.3rem; font-weight: bold; }

table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border:1px solid #ddd; padding: 8px; text-align: left; }
th { background:#f2f2f2; }

#map { width: 100%; height: 400px; margin-top: 20px; }

.resource-card { flex:1; padding:10px; margin:5px; background:#eef4ff; text-align:center; border-radius:8px; }
.stats-flex { display:flex; gap:10px; margin-bottom:10px; }
</style>

</head>
<body>

<h2>SMART AID ADMIN DASHBOARD</h2>

<!-- Stats Cards -->
<div class="stats-cards">
  <div class="card"><h3>Total Requests</h3><p id="total">0</p></div>
  <div class="card"><h3>Pending</h3><p id="pending">0</p></div>
  <div class="card"><h3>Dispatched</h3><p id="dispatched">0</p></div>
  <div class="card"><h3>Delivered</h3><p id="delivered">0</p></div>
</div>

<!-- Resource Cards -->
<h3>Available Resources</h3>
<div class="stats-flex" id="resourceSection"></div>

<!-- Requests Table -->
<h3>Requests</h3>
<table>
  <thead>
    <tr>
      <th>Victim</th>
      <th>State</th>
      <th>Type</th>
      <th>Status</th>
      <th>Update</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<!-- Map -->
<div id="map"></div>

<!-- Leaflet -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>

<!-- JS -->
<script src="js/admin.js"></script>
</body>
</html>
